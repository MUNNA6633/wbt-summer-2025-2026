<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form </title>
</head>

  <link rel="stylesheet" type="text/css" href="form.css">

<body>
    <form action="#" method="post">
        <div><h2>Donor Information</h2></div>
        <table>
        <tr>
          <td><label for="firstName">First Name<span >*</span></label></td>
          <td><input type="text" id="firstName" name="firstName" required></td>
        </tr>
        <tr>
          <td><label for="lastName">Last Name<span >*</span></label></td>
          <td><input type="text" id="lastName" name="lastName" required></td>
        </tr>
        <tr>
            
          <td><label for="company">Company</label></td>
          <td><input type="text" id="company" name="company"></td>
        </tr>
         <tr>
             
          <td><label for="address1">Address 1<span>*</span></label></td>
          <td><input type="text" id="address1" name="address1"></td>
        </tr>

        <tr>
          <td><label for="address">Address 2</label></td>
          <td><input type="text" id="address" name="address"></td>
        </tr>
         <tr>
          <td><label for="city">City<span>*</span></label></td>
          <td><input type="text" id="city" name="city"></td>
        </tr>
        <tr>
          <td><label for="state">State<span class="star">*</span></label><br></td>
          <td><select id="state" name="state">
              <option value="">-- Select a State --</option>
              <option value="ban">Bangladesh</option>
              <option value="brazil">Brazil</option>
              <option value="argentina">Argentina</option>
            </select></td>
        </tr>

         <tr>
             
          <td><label for="zip">Zip Code<span >*</span></label></td>
          <td><input type="text" id="zip" name="zip"></td>
        </tr>

         <tr>
          <td><label for="country">Country<span >*</span></label><br></td>
          <td><select id="country" name="country">
              <option value="">-- Select a Country --</option>
              <option value="bangladesh">Bangladesh</option>
              <option value="brazil">Brazil</option>
              <option value="argentina">Argentina</option>
            </select></td>
        </tr>
         <tr>
          <td><label for="phone">Phone</label></td>
          <td><input type="number" id="phone" name="phone"></td>
        </tr>
         <tr>
            
          <td><label for="fax">Fax</label></td>
          <td><input type="text" id="fax" name="fax"></td>
        </tr>
         <tr>
          <td><label for="email">Email<span>*</span></label></td>
          <td><input type="email" id="email" name="email" required></td>
        </tr>
        
        <tr>
          <td><label>Donation Amount<span>*</span></label><br>
        <p>(Check a button or type in your amount)</p></td>
          <td>
           <label><input type="radio" name="donationAmount" value="none" required> None</label>
      <label><input type="radio" name="donationAmount" value="50"> $50</label>
      <label><input type="radio" name="donationAmount" value="75"> $75</label>
      <label><input type="radio" name="donationAmount" value="100"> $100</label>
      <label><input type="radio" name="donationAmount" value="250"> $250</label>
      <label><input type="radio" name="donationAmount" value="other"> Other</label>
      <br>
      <label for="otherinfo">Other Amount $ <input type="number" id="otheramount" name="otheramount"></label>
          </td>
        </tr>
       
        <tr>
            <td><label for="recurring">Recurring Donation</label><br>
            <p>Check if Yes</p></td>

            <td><input type="checkbox" name="recurring" value="recurring"">I am interested in giving on a regular basis.<br>
            <label>Monthly Credit Card $</label>
    <input type="text" id="amount-input" name="monthlyAmount">
    <label>For</label>
    <input type="text" id="months-input" name="months">
    <label>Months</label>
            </td>
       
        
    

      </table>
      <div><h2>Honorarium and Memorial Donation Information</h2></div>
      <table>
       
        <tr>
          <td><label>I would like to make this donation</label></td>
    <td ><input type="radio" name="honorType" value="honor"> To Honor</input><br>
      <input type="radio" name="honorType" value="memory"> In Memory of
    </td>
  </tr>
    <tr>
    <td><label>Name</label></td>
    <td><input type="text" name="honorName" id="honorName"></td>
  </tr>
  <tr>
    <td><label> Donation to</label></td>
    <td ><input type="text" name="acknowledgeTo"></td>
  </tr>
  <tr>
    <td ><label>Address</label></td>
    <td ><input type="text" name="honorAddress"></td>
  </tr>
  <tr>
    <td ><label>City</label></td>
    <td><input type="text" name="honorCity"></td>
  </tr>
  <tr>
    <tr>
       <td><label for="state">State<span class="star">*</span></label><br></td>
          <td><select id="state" name="state">
              <option value="">-- Select a State --</option>
              <option value="ban">Bangladesh</option>
              <option value="brazil">Brazil</option>
              <option value="argentina">Argentina</option>
            </select></td>
    </tr>
    <tr>
       <td><label for="zip">Zip<span >*</span></label></td>
          <td><input type="text" id="zip" name="zip"></td>
    </tr>

      </table>
       
      
       <br>
          <button type="submit">Submit</button>
        
    </form>
    
</body>
</html>
